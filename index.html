<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Family Navi 2.1</title>
    <style>
        :root { 
            --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #334155; 
            --primary-blue: #1e40af; --secondary-gray: #64748b;
            --line-green: #06C755; --alert-red: #dc2626; 
        }
        body.dark-mode {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0; 
            --primary-blue: #60a5fa; --secondary-gray: #9ca3af;
        }
        body { 
            margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; 
            background: var(--bg-color); color: var(--text-main); 
            padding: 15px 15px 80px 15px;
        }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { font-size: 22px; color: var(--primary-blue); margin: 0; font-weight: 800; }
        .section-title { 
            font-size: 14px; font-weight: bold; color: var(--secondary-gray); 
            margin: 25px 0 10px 5px; border-left: 4px solid var(--primary-blue); padding-left: 10px; 
        }
        .card { 
            background: var(--card-bg); border-radius: 12px; padding: 18px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-dest { 
            display: flex; align-items: center; justify-content: center; height: 55px;
            font-size: 13px; font-weight: bold; color: white; border: none; 
            border-radius: 8px; cursor: pointer; text-decoration: none; text-align: center;
        }
        .bg-main { background: linear-gradient(135deg, #1e40af, #3b82f6); }
        .bg-sub1 { background: linear-gradient(135deg, #475569, #64748b); }
        .bg-sub2 { background: linear-gradient(135deg, #0f766e, #14b8a6); }
        
        .search-box { display: flex; gap: 8px; margin-top: 15px; }
        .input-dest { 
            flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px;
            background: var(--card-bg); color: var(--text-main);
        }
        .btn-line { 
            width: 100%; padding: 16px; background: var(--line-green); color: white; 
            border: none; border-radius: 8px; margin-bottom: 12px; font-size: 15px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Smart Family Navi</h1>
    </div>

    <div class="section-title">ルート案内 (乗換・徒歩)</div>
    <div class="card">
        <div class="grid-2">
            <button class="btn-dest bg-main" onclick="nav('自宅')">🏠 自宅へ</button>
            <button class="btn-dest bg-sub1" onclick="nav('東京都小平市津田町2-1-1')">🏫 はるな大学</button>
            <button class="btn-dest bg-sub1" onclick="nav('東京都港区港南4-5-7')">🏫 明日香大学</button>
            <button class="btn-dest bg-sub2" onclick="nav('東京都江東区越中島2-2-8')">🛏️ 明日香寮</button>
            <button class="btn-dest bg-sub2" onclick="nav('34.491866,134.861292')">🏡 淡路島実家</button>
            <button class="btn-dest bg-main" onclick="nav('東京都千代田区霞が関3-2-1')">🏢 パパ会社</button>
        </div>
        <div class="search-box">
            <input type="text" id="customDest" class="input-dest" placeholder="駅名・場所を入力">
            <button style="background: var(--primary-blue); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold;" onclick="search()">Go</button>
        </div>
    </div>

    <div class="section-title">家族の運勢 ＆ 献立</div>
    <div class="card">
        <button onclick="askFortune()" class="btn-line" style="background: linear-gradient(135deg, #6366f1, #a855f7); margin-bottom: 0;">✨ 5人の今日の運勢を聞く</button>
    </div>

    <div class="section-title">連絡</div>
    <div class="card">
        <button class="btn-line" onclick="sendLine('今から帰ります！')">💬 今から帰る</button>
        <button class="btn-line" style="background:#f8fafc; color:var(--text-main); border:1px solid #cbd5e1;" onclick="sendLoc()">📍 現在地を送る</button>
    </div>

<script>
    // ルート案内を実行する関数
    function nav(destination) {
        // スマホでアプリを確実に開くための最新URL形式
        // dir_action=navigate は運転用なので、家族利用を想定し全体の「dir」を使用
        const baseUrl = "https://www.google.com/maps/dir/?api=1";
        const encodedDest = encodeURIComponent(destination);
        
        // 公共交通機関(transit)をデフォルトに設定
        const url = `${baseUrl}&destination=${encodedDest}&travelmode=transit`;
        
        // 新しいタブではなく、現在のウィンドウで開くことでアプリ起動を促す
        window.location.href = url;
    }

    function search() {
        const val = document.getElementById('customDest').value;
        if (val) nav(val);
    }

    // 運勢AIへのリンク
    function askFortune() {
        const family = "1.パパ(1969/12/15,AB) 2.ママ(1972/8/24,A) 3.あすか(2001/7/23,A) 4.はるな(2004/5/10,AB) 5.こうせい(2010/9/21,A)";
        const date = new Date().toLocaleDateString();
        const prompt = `今日(${date})の家族5人の運勢を占って。各人に運勢,ランチ,ラッキーカラー,心がけを出して。最後に全員の運勢から今夜の献立候補を5つ提案して。データ:${family}`;
        
        // 長い文字列を安全に飛ばす
        window.open("https://chatgpt.com/?q=" + encodeURIComponent(prompt), "_blank");
    }

    function sendLine(msg) {
        window.location.href = "https://line.me/R/share?text=" + encodeURIComponent(msg);
    }

    function sendLoc() {
        if (!navigator.geolocation) return alert("GPSがオフです");
        navigator.geolocation.getCurrentPosition(p => {
            const locUrl = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
            sendLine("現在地はここです：\n" + locUrl);
        }, () => alert("位置情報を許可してください"));
    }
</script>
</body>
</html>
